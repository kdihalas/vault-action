name: E2E

on:
  pull_request:

jobs:
  e2e:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    services:
      vault:
        image: hashicorp/vault:latest
        env:
          VAULT_DEV_ROOT_TOKEN_ID: root
          VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
          VAULT_LOG_LEVEL: debug
        ports:
          - 8200:8200
        options: >-
          --cap-add=IPC_LOCK

      localstack:
        image: localstack/localstack:4
        env:
          SERVICES: iam,sts
          EAGER_SERVICE_LOADING: "1"
        ports:
          - 4566:4566
        options: >-
          --health-cmd "curl -sf http://localhost:4566/_localstack/health || exit 1"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
          --health-start-period 30s

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Wait for LocalStack
        run: |
          echo "Waiting for LocalStack to be ready..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:4566/_localstack/health | grep -q '"iam"'; then
              echo "LocalStack IAM service is ready"
              break
            fi
            echo "  attempt ${i}/30 — not ready yet, sleeping 2s"
            sleep 2
          done
          curl -sf http://localhost:4566/_localstack/health

      - name: Configure Vault (JWT + KV)
        env:
          VAULT_ADDR: http://localhost:8200
          VAULT_TOKEN: root
        run: |
          # Enable JWT auth method
          curl -sf \
            --header "X-Vault-Token: ${VAULT_TOKEN}" \
            --request POST \
            --data '{"type":"jwt"}' \
            "${VAULT_ADDR}/v1/sys/auth/jwt"

          # Configure JWT auth with GitHub OIDC discovery
          curl -sf \
            --header "X-Vault-Token: ${VAULT_TOKEN}" \
            --request POST \
            --data '{
              "oidc_discovery_url": "https://token.actions.githubusercontent.com",
              "bound_issuer": "https://token.actions.githubusercontent.com"
            }' \
            "${VAULT_ADDR}/v1/auth/jwt/config"

          # Create a policy allowing read on KV, AWS creds, and Kubernetes creds paths
          curl -sf \
            --header "X-Vault-Token: ${VAULT_TOKEN}" \
            --request POST \
            --data '{
              "policy": "path \"secret/data/e2e/*\" { capabilities = [\"read\"] }\npath \"aws/creds/e2e-role\" { capabilities = [\"read\"] }\npath \"aws/sts/e2e-role\" { capabilities = [\"read\"] }\npath \"kubernetes/creds/e2e-role\" { capabilities = [\"update\"] }"
            }' \
            "${VAULT_ADDR}/v1/sys/policies/acl/e2e-policy"

          # Create the JWT role bound to this repository and the vault-e2e audience
          curl -sf \
            --header "X-Vault-Token: ${VAULT_TOKEN}" \
            --request POST \
            --data "{
              \"role_type\": \"jwt\",
              \"bound_audiences\": [\"vault-e2e\"],
              \"bound_claims\": {\"repository\": \"${GITHUB_REPOSITORY}\"},
              \"user_claim\": \"actor\",
              \"policies\": [\"e2e-policy\"],
              \"ttl\": \"1h\"
            }" \
            "${VAULT_ADDR}/v1/auth/jwt/role/github-action"

          # KV v2 is already mounted at secret/ in dev mode; write the test secret
          curl -sf \
            --header "X-Vault-Token: ${VAULT_TOKEN}" \
            --request POST \
            --data '{"data":{"username":"e2e-user","password":"super-secret-value"}}' \
            "${VAULT_ADDR}/v1/secret/data/e2e/test"

      - name: Configure Vault AWS secrets engine (LocalStack)
        env:
          VAULT_ADDR: http://localhost:8200
          VAULT_TOKEN: root
          # Dummy credentials — LocalStack does not validate them for IAM/STS operations
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_DEFAULT_REGION: us-east-1
        run: |
          # Create an IAM user in LocalStack for Vault to use as its root credential
          aws --endpoint-url=http://localhost:4566 iam create-user --user-name vault-e2e

          # Attach a broad inline policy so the user can call STS on LocalStack
          aws --endpoint-url=http://localhost:4566 iam put-user-policy \
            --user-name vault-e2e \
            --policy-name vault-e2e-policy \
            --policy-document '{"Version":"2012-10-17","Statement":[{"Effect":"Allow","Action":"*","Resource":"*"}]}'

          # Create an access key for the IAM user and capture the credentials
          KEY_JSON=$(aws --endpoint-url=http://localhost:4566 iam create-access-key --user-name vault-e2e)
          VAULT_AWS_ACCESS_KEY=$(echo "${KEY_JSON}" | python3 -c "import sys,json; d=json.load(sys.stdin)['AccessKey']; print(d['AccessKeyId'])")
          VAULT_AWS_SECRET_KEY=$(echo "${KEY_JSON}" | python3 -c "import sys,json; d=json.load(sys.stdin)['AccessKey']; print(d['SecretAccessKey'])")

          # Enable the AWS secrets engine at aws/
          curl -sf \
            --header "X-Vault-Token: ${VAULT_TOKEN}" \
            --request POST \
            --data '{"type":"aws"}' \
            "${VAULT_ADDR}/v1/sys/mounts/aws"

          # Configure root credentials pointing at LocalStack
          # Vault (in its service container) reaches LocalStack via the bridge network hostname
          curl -sf \
            --header "X-Vault-Token: ${VAULT_TOKEN}" \
            --request POST \
            --data "{
              \"access_key\": \"${VAULT_AWS_ACCESS_KEY}\",
              \"secret_key\": \"${VAULT_AWS_SECRET_KEY}\",
              \"region\": \"us-east-1\",
              \"iam_endpoint\": \"http://localstack:4566\",
              \"sts_endpoint\": \"http://localstack:4566\"
            }" \
            "${VAULT_ADDR}/v1/aws/config/root"

          # Create a federation_token role — Vault calls sts:GetFederationToken, which returns
          # a security_token (session token), exercising the full AWS creds path in the action
          curl -sf \
            --header "X-Vault-Token: ${VAULT_TOKEN}" \
            --request POST \
            --data '{
              "credential_type": "federation_token",
              "default_sts_ttl": "3600s",
              "max_sts_ttl": "3600s",
              "policy_document": "{\"Version\":\"2012-10-17\",\"Statement\":[{\"Effect\":\"Allow\",\"Action\":\"*\",\"Resource\":\"*\"}]}"
            }' \
            "${VAULT_ADDR}/v1/aws/roles/e2e-role"

      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: e2e

      - name: Connect Vault to kind network
        run: |
          KIND_CONTAINER=$(docker ps -qf "name=e2e-control-plane")
          VAULT_CONTAINER=$(docker ps -qf "ancestor=hashicorp/vault")

          # Save Vault's container IP on its original network BEFORE connecting to kind's
          # network — docker network connect breaks the localhost port mapping permanently,
          # so all subsequent Vault API calls must use the container IP directly
          VAULT_ORIGINAL_NETWORK=$(docker inspect "${VAULT_CONTAINER}" --format '{{range $k, $v := .NetworkSettings.Networks}}{{$k}} {{end}}' | awk '{print $1}')
          VAULT_IP=$(docker inspect "${VAULT_CONTAINER}" --format "{{(index .NetworkSettings.Networks \"${VAULT_ORIGINAL_NETWORK}\").IPAddress}}")
          echo "Vault container IP: ${VAULT_IP}"
          echo "VAULT_ADDR=http://${VAULT_IP}:8200" >> "${GITHUB_ENV}"

          # Connect Vault to kind's network so it can reach the K8s API server
          # on its original IP (which is in the TLS certificate's SANs)
          KIND_NETWORK=$(docker inspect "${KIND_CONTAINER}" --format '{{range $k, $v := .NetworkSettings.Networks}}{{$k}} {{end}}' | awk '{print $1}')
          docker network connect "${KIND_NETWORK}" "${VAULT_CONTAINER}"

          # Use kind's original IP which is covered by the API server's TLS certificate
          K8S_IP=$(docker inspect "${KIND_CONTAINER}" --format "{{(index .NetworkSettings.Networks \"${KIND_NETWORK}\").IPAddress}}")
          K8S_HOST="https://${K8S_IP}:6443"
          echo "Kubernetes API server (from Vault's perspective): ${K8S_HOST}"

          # Extract CA cert from kubeconfig
          K8S_CA_B64=$(kubectl config view --raw -o jsonpath='{.clusters[0].cluster.certificate-authority-data}')

          echo "K8S_HOST=${K8S_HOST}" >> "${GITHUB_ENV}"
          echo "K8S_CA_B64=${K8S_CA_B64}" >> "${GITHUB_ENV}"

          # Wait for Vault to be reachable at its container IP
          for i in $(seq 1 15); do
            if curl -sf "http://${VAULT_IP}:8200/v1/sys/health" >/dev/null 2>&1; then
              echo "Vault is reachable at container IP"
              break
            fi
            echo "  attempt ${i}/15 — Vault not reachable yet, sleeping 2s"
            sleep 2
          done

      - name: Configure Vault Kubernetes secrets engine
        env:
          VAULT_TOKEN: root
        run: |
          K8S_CA=$(echo "${K8S_CA_B64}" | base64 -d)

          # Create a service account for Vault with token-creation permissions
          kubectl create serviceaccount vault-auth -n default
          kubectl create clusterrolebinding vault-auth-tokenreview \
            --clusterrole=system:auth-delegator \
            --serviceaccount=default:vault-auth
          kubectl create clusterrole vault-sa-creator \
            --verb=create,get,delete \
            --resource=serviceaccounts,serviceaccounts/token,secrets
          kubectl create clusterrolebinding vault-sa-creator-binding \
            --clusterrole=vault-sa-creator \
            --serviceaccount=default:vault-auth
          kubectl apply -f - <<'EOF'
          apiVersion: rbac.authorization.k8s.io/v1
          kind: ClusterRole
          metadata:
            name: vault-role-creator
          rules:
            - apiGroups: ["rbac.authorization.k8s.io"]
              resources: ["roles", "rolebindings", "clusterroles", "clusterrolebindings"]
              verbs: ["create", "get", "delete", "bind", "escalate"]
          EOF
          kubectl create clusterrolebinding vault-role-creator-binding \
            --clusterrole=vault-role-creator \
            --serviceaccount=default:vault-auth
          VAULT_SA_TOKEN=$(kubectl create token vault-auth --duration=1h)

          # Enable Kubernetes secrets engine
          curl -sfS \
            --header "X-Vault-Token: ${VAULT_TOKEN}" \
            --request POST \
            --data '{"type":"kubernetes"}' \
            "${VAULT_ADDR}/v1/sys/mounts/kubernetes"

          # Configure the engine to talk to the kind cluster
          curl -sfS \
            --header "X-Vault-Token: ${VAULT_TOKEN}" \
            --request POST \
            --data "$(python3 -c "
          import json, sys
          print(json.dumps({
              'kubernetes_host': '${K8S_HOST}',
              'kubernetes_ca_cert': '''${K8S_CA}''',
              'service_account_jwt': '${VAULT_SA_TOKEN}'
          }))
          ")" \
            "${VAULT_ADDR}/v1/kubernetes/config"

          # Create a role that generates service account tokens
          curl -sfS \
            --header "X-Vault-Token: ${VAULT_TOKEN}" \
            --request POST \
            --data '{
              "allowed_kubernetes_namespaces": ["default"],
              "token_default_ttl": "1h",
              "generated_role_rules": "{\"rules\":[{\"apiGroups\":[\"\"],\"resources\":[\"pods\"],\"verbs\":[\"list\"]}]}"
            }' \
            "${VAULT_ADDR}/v1/kubernetes/roles/e2e-role"

      - name: Use local Dockerfile for action
        run: |
          sed -i 's|image: docker://.*|image: Dockerfile|' action.yaml

      - name: Run vault-action
        uses: ./
        env:
          ACTIONS_STEP_DEBUG: true
        with:
          url: http://vault:8200
          role: github-action
          jwt_claim: vault-e2e
          secrets: |
            secret/e2e/test username | E2E_USERNAME;
            secret/e2e/test password | E2E_PASSWORD
          aws_secrets: |
            aws/e2e-role | E2E_AWS;
          kube_secrets: |
            kubernetes/e2e-role default ${{ env.K8S_HOST }} ${{ env.K8S_CA_B64 }}|e2e-context

      - name: Assert secrets
        run: |
          FAILED=0

          # KV assertions
          if [ -z "${E2E_USERNAME}" ]; then
            echo "FAIL: E2E_USERNAME is empty"
            FAILED=1
          elif [ "${E2E_USERNAME}" != "e2e-user" ]; then
            echo "FAIL: E2E_USERNAME has unexpected value (not 'e2e-user')"
            FAILED=1
          else
            echo "PASS: E2E_USERNAME is set and correct"
          fi

          if [ -z "${E2E_PASSWORD}" ]; then
            echo "FAIL: E2E_PASSWORD is empty"
            FAILED=1
          elif [ "${E2E_PASSWORD}" != "super-secret-value" ]; then
            echo "FAIL: E2E_PASSWORD has unexpected value"
            FAILED=1
          else
            echo "PASS: E2E_PASSWORD is set and correct"
          fi

          # AWS credential assertions — values are dynamic so we check non-empty + minimum length
          if [ -z "${E2E_AWS_ACCESS_KEY_ID}" ]; then
            echo "FAIL: E2E_AWS_ACCESS_KEY_ID is empty"
            FAILED=1
          elif [ "${#E2E_AWS_ACCESS_KEY_ID}" -lt 8 ]; then
            echo "FAIL: E2E_AWS_ACCESS_KEY_ID is suspiciously short (${#E2E_AWS_ACCESS_KEY_ID} chars)"
            FAILED=1
          else
            echo "PASS: E2E_AWS_ACCESS_KEY_ID is set (length: ${#E2E_AWS_ACCESS_KEY_ID})"
          fi

          if [ -z "${E2E_AWS_SECRET_ACCESS_KEY}" ]; then
            echo "FAIL: E2E_AWS_SECRET_ACCESS_KEY is empty"
            FAILED=1
          elif [ "${#E2E_AWS_SECRET_ACCESS_KEY}" -lt 8 ]; then
            echo "FAIL: E2E_AWS_SECRET_ACCESS_KEY is suspiciously short (${#E2E_AWS_SECRET_ACCESS_KEY} chars)"
            FAILED=1
          else
            echo "PASS: E2E_AWS_SECRET_ACCESS_KEY is set (length: ${#E2E_AWS_SECRET_ACCESS_KEY})"
          fi

          if [ -z "${E2E_AWS_SESSION_TOKEN}" ]; then
            echo "FAIL: E2E_AWS_SESSION_TOKEN is empty (expected from federation_token role)"
            FAILED=1
          elif [ "${#E2E_AWS_SESSION_TOKEN}" -lt 8 ]; then
            echo "FAIL: E2E_AWS_SESSION_TOKEN is suspiciously short (${#E2E_AWS_SESSION_TOKEN} chars)"
            FAILED=1
          else
            echo "PASS: E2E_AWS_SESSION_TOKEN is set (length: ${#E2E_AWS_SESSION_TOKEN})"
          fi

          # Kubernetes kubeconfig assertions
          # The action runs in a Docker container where RUNNER_TEMP is mounted at
          # /github/runner_temp, but this step runs on the host. Translate the path.
          if [ -n "${KUBECONFIG}" ]; then
            KUBECONFIG="${RUNNER_TEMP}/$(basename "${KUBECONFIG}")"
          fi

          if [ -z "${KUBECONFIG}" ]; then
            echo "FAIL: KUBECONFIG is empty"
            FAILED=1
          elif [ ! -f "${KUBECONFIG}" ]; then
            echo "FAIL: KUBECONFIG file does not exist: ${KUBECONFIG}"
            FAILED=1
          else
            echo "PASS: KUBECONFIG is set and file exists (${KUBECONFIG})"
            echo "--- kubeconfig contents (tokens redacted) ---"
            sed 's/token: .*/token: [REDACTED]/' "${KUBECONFIG}"
            echo "---"

            # Verify the kubeconfig has the expected context
            CONTEXTS=$(kubectl config get-contexts -o name --kubeconfig="${KUBECONFIG}" 2>&1 || true)
            if echo "${CONTEXTS}" | grep -q "e2e-context"; then
              echo "PASS: kubeconfig contains 'e2e-context'"
            else
              echo "FAIL: kubeconfig does not contain 'e2e-context' (found: ${CONTEXTS})"
              FAILED=1
            fi

            # Verify the generated credentials actually work against the kind cluster
            if kubectl --kubeconfig="${KUBECONFIG}" --context=e2e-context get pods -n default 2>&1; then
              echo "PASS: Kubernetes credentials are valid (can list pods)"
            else
              echo "FAIL: Kubernetes credentials are invalid (cannot list pods)"
              FAILED=1
            fi
          fi

          # Reset KUBECONFIG so the kind-action post step can clean up using its default config
          echo "KUBECONFIG=" >> "${GITHUB_ENV}"

          exit "${FAILED}"
