---
name: Simple Vault Action
author: Konstantinos Dichalas
description: |
  An action that helps you inderact with a Hashicorp Vault Instance

inputs:
  url:
    description: The URL of the Vault instance
    required: true
  role:
    description: The Vault role to use for authentication
    required: false
    default: "github-action"
  jwt_claim:
    description: The JWT claim to use for authentication
    required: false
    default: actor
  output_token:
    description: Output the Vault token
    required: false
    default: "false"
  secrets:
    description: A list of secrets to read from Vault
    required: false
    default: "empty"
  aws_secrets:
    description: >
      A list of Vault AWS secrets engine roles to generate dynamic AWS credentials from.
      Format: "<mount>/<role> | <ENV_PREFIX>" (one per line, semicolon-separated).
      Exports <PREFIX>_ACCESS_KEY_ID, <PREFIX>_SECRET_ACCESS_KEY, and (when present) <PREFIX>_SESSION_TOKEN.
    required: false
    default: "empty"

runs:
  using: docker
  image: docker://ghcr.io/kdihalas/vault-action:v1.0.0 # x-release-please-version
