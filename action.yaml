---
name: Simple Vault Action
author: Konstantinos Dichalas
description: |
  An action that helps you inderact with a Hashicorp Vault Instance

inputs:
  url:
    description: The URL of the Vault instance
    required: true
  role:
    description: The Vault role to use for authentication
    required: false
    default: "github-action"
  jwt_claim:
    description: The JWT claim to use for authentication
    required: false
    default: actor
  output_token:
    description: Output the Vault token
    required: false
    default: "false"
  secrets:
    description: A list of secrets to read from Vault
    required: false
    default: "empty"
  aws_secrets:
    description: >
      A list of Vault AWS secrets engine roles to generate dynamic AWS credentials from.
      Format: "<mount>/<role> | <ENV_PREFIX>" (one per line, semicolon-separated).
      Exports <PREFIX>_ACCESS_KEY_ID, <PREFIX>_SECRET_ACCESS_KEY, and (when present) <PREFIX>_SESSION_TOKEN.
    required: false
    default: "empty"
  kube_secrets:
    description: >
      A list of Vault Kubernetes secrets engine roles to generate short-lived service account tokens from.
      Format: "<mount>/<role> <namespace> <api_server_url> <ca_cert_b64> | <context_name>" (one per line, semicolon-separated).
      Writes a merged kubeconfig to $RUNNER_TEMP, exports KUBECONFIG, and sets the kubeconfig output.
    required: false
    default: "empty"

outputs:
  kubeconfig:
    description: >
      Path to the generated kubeconfig file containing all Kubernetes contexts from kube_secrets entries.
      Only set when kube_secrets is provided.

runs:
  using: docker
  image: docker://ghcr.io/kdihalas/vault-action:v1.0.0 # x-release-please-version
